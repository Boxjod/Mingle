; PlatformIO Configuration for Box2Robot Camera (ESP32-S3 M5AtomS3R-CAM)
; Architecture: ESP-IDF + Arduino Component
; Camera MJPEG streaming over WiFi

[platformio]
default_envs = esp32s3-cam
src_dir = main

[env:esp32s3-cam]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21/platform-espressif32.zip
board = m5stack-atoms3
framework = espidf
monitor_speed = 115200
monitor_filters = direct, esp32_exception_decoder
extra_scripts = post:scripts/idf_monitor.py
monitor_rts = 0
monitor_dtr = 0

; Upload settings
upload_speed = 921600
; upload_port auto-detected (remove fixed COM to auto-detect)

; Flash: 8MB
board_build.partitions = partitions.csv
board_upload.flash_size = 8MB
